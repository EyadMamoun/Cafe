<div class="menu-option">
    <div class="img-style">
        <img [src]="menuItems.productImg" alt="Product image">
    </div>
    <div class="product-description">
        <div class="d-flex flex-column">
            <span class="product-title">{{menuItems.productName}}</span>
            <span class="description">{{menuItems.productDescription}}</span>
        </div>
        <div class="w-100 d-flex justify-content-between">
            <span class="price">{{'EGP ' + menuItems.productPrice}}</span>
            @if(isCounter){
            <div class="counter">
                <button class="btn counter-btn" (click)="removeItemBtn()">-</button>
                <span class="px-2 fs-5">{{counter}}</span>
                <button class="btn counter-btn" (click)="addItemBtn()">+</button>
            </div>
            }
            <button class="btn btn-style" (click)="orderBtnClick()">{{btnState}}</button>
        </div>
    </div>
</div>
