<div class="container py-5">
    <div class="row align-items-center bg-white py-4 border rounded">
        <span class="header-style">COFFEE MENU</span>

        <div class="stepper">
            <div class="stepper-option" [class.stepper-active-option]="isHotDrinks" (click)="viewHotDrinks()">Hot Drinks
            </div>
            <div class="stepper-option" [class.stepper-active-option]="isColdDrinks" (click)="viewColdDrinks()">Cold
                Drinks</div>
        </div>

        <div class="menu-container">
            @for (item of hotCoffee; track item.id) {
            <div class="menu-option">
                <div class="img-style">
                    <app-product-card [imgSrc]="item.productImg" [showPrice]="false" />
                </div>
                <div class="product-description">
                    <div class="d-flex flex-column">
                        <span class="fs-4">{{item.productName}}</span>
                        <span>{{item.productDescription}}</span>
                    </div>
                    <div class="w-100 d-flex justify-content-between">
                        <span class="fw-bold fs-5">{{'EGP ' + item.productPrice}}</span>
                        <button class="btn btn-style">Order Now</button>
                    </div>
                </div>
            </div>
            }
        </div>
    </div>
</div>
